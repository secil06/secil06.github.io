<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seçil Web Sitesi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>Merhaba, Ben Seçil! ✨</h1>
            <p>Kendi web sitemi tasarlıyor ve kodluyorum!</p>
            
            <button id="GosterButonu">Beni Gör 🚀</button>
            
            <div id="FotografKutusu" class="gizli">
                <img src="fotografim.jpg" alt="Seçil'in Fotoğrafı" id="ProfilFotosu">
            </div>
        </div>
    </div>

    <script>
        const buton = document.getElementById('GosterButonu');
        const fotoKutusu = document.getElementById('FotografKutusu');

        buton.addEventListener('click', function() {
            fotoKutusu.classList.toggle('aktif');
            if(fotoKutusu.classList.contains('aktif')) {
                buton.textContent = 'Beni Gizle 🙈';
            } else {
                buton.textContent = 'Beni Gör 🚀';
            }
        });
    </script>
</body>
</html>
